services:
  db:
    image: postgres:16
    environment:
      DATABASE_ENGINE: postgres
      POSTGRES_DB: breathe_esg
      POSTGRES_USER: breathe
      POSTGRES_PASSWORD: breathe
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  backend:
    build: ./backend
    environment:
      POSTGRES_DB: breathe_esg
      POSTGRES_USER: breathe
      POSTGRES_PASSWORD: breathe
      POSTGRES_HOST: db
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      - db
  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
volumes:
  postgres-data:
